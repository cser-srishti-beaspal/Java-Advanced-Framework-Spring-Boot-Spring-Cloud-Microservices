spring.application.name=project-service

server.port=8081

# Eureka Server URL (where your Eureka Server is running)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Register this service with Eureka
eureka.client.register-with-eureka=true

# Fetch registry from Eureka (to discover other services)
eureka.client.fetch-registry=true

# Instance details
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

# Optional: instance ID (useful if multiple instances)
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.datasource.url=jdbc:mysql://localhost:3306/microservice-project-db
spring.datasource.username=root
spring.datasource.password=E23shastrinagar
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional (not needed in newer versions but safe)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
